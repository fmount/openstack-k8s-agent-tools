name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin structure
        run: bash tests/test-plugin.sh structure

      - name: Validate plugin functionality
        run: bash tests/test-plugin.sh functional

      - name: Check shell script syntax
        run: |
          errors=0
          for script in lib/*.sh scripts/*.sh tests/*.sh; do
            if [ -f "$script" ]; then
              echo "Checking: $script"
              if ! bash -n "$script"; then
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors script(s) have syntax errors"
            exit 1
          fi
          echo "All shell scripts pass syntax check"

      - name: Check JSON validity
        run: |
          errors=0
          for json in .claude-plugin/plugin.json .claude-plugin/marketplace.json package.json lib/log-patterns.json; do
            if [ -f "$json" ]; then
              echo "Checking: $json"
              if ! node -e "JSON.parse(require('fs').readFileSync('$json', 'utf8'))"; then
                errors=$((errors + 1))
              fi
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors JSON file(s) are invalid"
            exit 1
          fi
          echo "All JSON files are valid"

      - name: Validate SKILL.md frontmatter
        run: |
          errors=0
          for skill_dir in skills/*/; do
            skill_file="$skill_dir/SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL: $skill_dir missing SKILL.md"
              errors=$((errors + 1))
              continue
            fi

            skill_name=$(basename "$skill_dir")
            echo "Validating: $skill_name"

            # Check frontmatter delimiters
            if ! head -1 "$skill_file" | grep -q "^---$"; then
              echo "  FAIL: missing opening frontmatter delimiter"
              errors=$((errors + 1))
              continue
            fi

            # Extract frontmatter (between first and second ---)
            frontmatter=$(sed -n '2,/^---$/p' "$skill_file" | head -n -1)

            # Check required fields
            for field in name description user-invocable; do
              if ! echo "$frontmatter" | grep -q "^${field}:"; then
                echo "  FAIL: missing required field '$field'"
                errors=$((errors + 1))
              fi
            done

            # Check name matches directory
            fm_name=$(echo "$frontmatter" | grep "^name:" | sed 's/^name: *//')
            if [ "$fm_name" != "$skill_name" ]; then
              echo "  FAIL: frontmatter name '$fm_name' does not match directory '$skill_name'"
              errors=$((errors + 1))
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors frontmatter issue(s) found"
            exit 1
          fi
          echo "All SKILL.md frontmatter is valid"

      - name: Validate AGENT.md references
        run: |
          errors=0
          for skill_file in skills/*/SKILL.md; do
            skill_name=$(basename "$(dirname "$skill_file")")

            # Check if SKILL.md references an AGENT.md
            if grep -q "agents/$skill_name/AGENT.md" "$skill_file"; then
              agent_file="agents/$skill_name/AGENT.md"
              if [ ! -f "$agent_file" ]; then
                echo "FAIL: $skill_file references $agent_file but it does not exist"
                errors=$((errors + 1))
              else
                echo "OK: $skill_name -> $agent_file"
              fi
            fi
          done

          # Also check that all agents have content
          for agent_file in agents/*/AGENT.md; do
            if [ -f "$agent_file" ]; then
              lines=$(wc -l < "$agent_file")
              if [ "$lines" -lt 10 ]; then
                echo "WARN: $agent_file has only $lines lines (seems too short)"
              fi
            fi
          done

          if [ "$errors" -gt 0 ]; then
            echo "FAIL: $errors agent reference issue(s) found"
            exit 1
          fi
          echo "All AGENT.md references are valid"
